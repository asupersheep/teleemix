services:
  teleemix:
    image: ghcr.io/asupersheep/teleemix:latest
    container_name: teleemix
    restart: unless-stopped
    network_mode: host
    volumes:
      # Update left side to point to your docker-compose file on the host.
      - /path/to/your/docker-compose.yml:/compose/docker-compose.yml
      # Mount your .env file so /updatearl persists the new ARL.
      - /path/to/your/.env:/app/.env
      # Persistent user settings and notification registry.
      - /path/to/your/data/users.json:/app/users.json
      # Allows the bot to talk to Docker (for /updatearl restart trigger).
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - /path/to/your/.env
